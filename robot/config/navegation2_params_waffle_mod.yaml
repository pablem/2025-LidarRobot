bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False

    # ── FRECUENCIA DE CONTROL ─────────────────────────────────────────────
    # 10 Hz
    controller_frequency: 10.0

    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5   # ignorado en robot diferencial
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # Distancia mínima que debe recorrer el robot en movement_time_allowance segundos.
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      # ── TOLERANCIA DE LLEGADA AL OBJETIVO ────────────────────────────────
      # es razonable. Bajar a 0.15 para más precisión
      xy_goal_tolerance: 0.25
      # Tolerancia angular al llegar al goal (radianes). 0.25 rad ≈ 14°.
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True

      # ── VELOCIDADES MÁXIMAS Y MÍNIMAS ────────────────────────────────────
      # turtlebot3 waffle: 0.22 m/s
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.22       
      max_vel_y: 0.0        
      max_vel_theta: 1.0    
      min_speed_xy: 0.0
      max_speed_xy: 0.22    # igual que max_vel_x
      min_speed_theta: 0.0

      # ── ACELERACIONES ─────────────────────────────────────────────────────
      acc_lim_x: 2.5        # aceleración lineal máxima (m/s²)
      acc_lim_y: 0.0        
      acc_lim_theta: 3.2    # aceleración angular máxima (rad/s²)
      decel_lim_x: -2.5     # desaceleración lineal (debe ser negativa)
      decel_lim_y: 0.0
      decel_lim_theta: -3.2 # desaceleración angular (debe ser negativa)

      # ── MUESTREO DE TRAYECTORIAS DWA ─────────────────────────────────────
      # vx_samples: cuántas velocidades lineales simular
      vx_samples: 20
      vy_samples: 0         
      vtheta_samples: 40

      # ── TIEMPO DE SIMULACIÓN ──────────────────────────────────────────────
      # sim_time: cuántos segundos hacia adelante simula DWB.
      sim_time: 2.0

      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2

      # xy_goal_tolerance acá es para DWB internamente (puede diferir del goal_checker).
      xy_goal_tolerance: 0.05

      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      stateful: True

      # ── CRÍTICOS DE DWB ───────────────────────────────────────────────────
      # Estos puntajes determinan cómo DWB elige la mejor trayectoria.
      # Los valores son estándar
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true

      # ── TAMAÑO DEL COSTMAP LOCAL ──────────────────────────────────────────
      # 3x3 metros es el área alrededor del robot que Nav2 usa para evitar obstáculos.
      # en 3x3 para pasillos estrechos.
      width: 3
      height: 3
      resolution: 0.05  # 5 cm por celda

      # ── RADIO DEL ROBOT ───────────────────────────────────────────────────
      # robot_radius: 0.225
      # Usar footprint en lugar de robot_radius; ancho 0.45 y largo 0.35
      # footprint: "[ [-0.175, -0.23], [-0.175, 0.23], [0.175, 0.23], [0.175, -0.23] ]"
      footprint: "[ [-0.05, -0.23], [-0.05, 0.23], [0.27, 0.23], [0.27, -0.23] ]"
      # ── CAPAS DEL COSTMAP ─────────────────────────────────────────────────
      # obstacle_layer: obstáculos 2D detectados por el lidar 
      # voxel_layer: obstáculos 3D (no usar, para cámaras, sensores 3D)
      # inflation_layer: zona de "coste" alrededor de obstáculos 

      #plugins: ["obstacle_layer", "voxel_layer", "inflation_layer"]
      plugins: ["obstacle_layer", "inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.7    # margen (en metros) que agrega alrededor de obstáculos.
        cost_scaling_factor: 3.0 # qué tan rápido decrece el coste con la distancia

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan    
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"

      # voxel_layer:
      #   plugin: "nav2_costmap_2d::VoxelLayer"
      #   enabled: True   # ← cambiar a False o eliminar toda la sección
      #   publish_voxel_map: True
      #   origin_z: 0.0
      #   z_resolution: 0.05
      #   z_voxels: 16
      #   max_obstacle_height: 2.0
      #   mark_threshold: 0
      #   observation_sources: scan
      #   scan:
      #     topic: /scan
      #     max_obstacle_height: 2.0
      #     clearing: True
      #     marking: True
      #     data_type: "LaserScan"
      #     raytrace_max_range: 3.0
      #     raytrace_min_range: 0.0
      #     obstacle_max_range: 2.5
      #     obstacle_min_range: 0.0

      static_layer:
        map_subscribe_transient_local: True
      always_send_full_costmap: True

  local_costmap_client:
    ros__parameters:
      use_sim_time: False
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False #True

      # ── RADIO DEL ROBOT (global) ──────────────────────────────────────────
      # Mismo valor que en local_costmap.
      # robot_radius: 0.225
      # footprint: "[ [-0.175, -0.23], [-0.175, 0.23], [0.175, 0.23], [0.175, -0.23] ]"
      footprint: "[ [-0.05, -0.23], [-0.05, 0.23], [0.27, 0.23], [0.27, -0.23] ]"

      resolution: 0.05
      track_unknown_space: true

      # plugins: ["static_layer", "obstacle_layer", "voxel_layer", "inflation_layer"]
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

     
      # voxel_layer:
      #   plugin: "nav2_costmap_2d::VoxelLayer"
      #   enabled: True   # ← cambiar a False o eliminar
      #   publish_voxel_map: True
      #   origin_z: 0.0
      #   z_resolution: 0.05
      #   z_voxels: 16
      #   max_obstacle_height: 2.0
      #   mark_threshold: 0
      #   observation_sources: scan
      #   scan:
      #     topic: /scan
      #     max_obstacle_height: 2.0
      #     clearing: True
      #     marking: True
      #     data_type: "LaserScan"
      #     raytrace_max_range: 3.0
      #     raytrace_min_range: 0.0
      #     obstacle_max_range: 2.5
      #     obstacle_min_range: 0.0

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # inflation_radius global: puede ser menor que el local.
        inflation_radius: 0.7 

      always_send_full_costmap: True

  global_costmap_client:
    ros__parameters:
      use_sim_time: False
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "map.yaml"

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      # tolerance: radio de búsqueda alrededor del goal si no es alcanzable.
      tolerance: 0.5
      # use_astar: false → usa Dijkstra. True → A* (más rápido en mapas grandes).
      use_astar: false
      allow_unknown: true  # permite planear a través de espacio no explorado

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_timeout: 0.1
    use_sim_time: False #true

    simulate_ahead_time: 2.0

    # ── VELOCIDADES DE RECUPERACIÓN ───────────────────────────────────────
    # Estas velocidades se usan cuando el robot está atascado y ejecuta un spin.
    max_rotational_vel: 1.5
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    loop_rate: 200
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      # Tiempo de espera en cada waypoint (ms). 200ms = 0.2 segundos.
      waypoint_pause_duration: 500