amcl:
  ros__parameters:
    use_sim_time: False

    # ── MODELO DE MOVIMIENTO ──────────────────────────────────────────────
    # alpha1..alpha4: ruido del odómetro. Valores más altos = más incertidumbre.
    # (ruido de traslación→traslación y rotación→rotación) si los encoders son precisos.
    # Valores típicos para encoders de buena calidad: 0.1 ~ 0.15.
    # Subir estos valores si SLAM deriva mucho.
    alpha1: 0.2   # ruido de traslación causado por traslación
    alpha2: 0.2   # ruido de traslación causado por rotación
    alpha3: 0.2   # ruido de rotación causado por traslación
    alpha4: 0.2   # ruido de rotación causado por rotación
    alpha5: 0.2   # solo se usa con modelo de movimiento "omni", ignorar

    # ── FRAMES ───────────────────────────────────────────────────────────
    # Está en el URDF. es la convención estándar
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"

    # ── PARÁMETROS LÁSER XV-11 ────────────────────────────────────────
    # Rango XV-11 0.06 a ~5 m
    # laser_min_range: -1.0 = "usar el mínimo del sensor" 
    # laser_max_range: 100.0 = "usar el máximo del sensor" 
    laser_min_range: -1.0
    laser_max_range: 100.0
    # max_beams: cuántos rayos usa AMCL. El XV-11 tiene 360 puntos.
    max_beams: 60
    # likelihood_field: modelo estándar para lidars en interiores.
    laser_model_type: "likelihood_field"
    # Distancia máxima a un obstáculo para calcular probabilidad.
    laser_likelihood_max_dist: 2.0

    # ── PARTÍCULAS ────────────────────────────────────────────────────────
    # Si la localización es lenta, bajar max_particles a 1000.
    # Si el robot se pierde frecuentemente, subir max_particles a 3000.
    min_particles: 500
    max_particles: 2000

    # ── FILTRO DE PARTÍCULAS ──────────────────────────────────────────────
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1

    # ── CUÁNDO ACTUALIZAR ─────────────────────────────────────────────────
    # update_min_d: distancia mínima recorrida para actualizar el filtro (metros).
    # update_min_a: ángulo mínimo girado para actualizar (radianes).
    update_min_d: 0.25
    update_min_a: 0.2

    # ── MODELO DE MOVIMIENTO ──────────────────────────────────────────────
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    # ── PESOS DEL MODELO LÁSER ────────────────────────────────────────────
    # z_hit + z_max + z_rand + z_short = 1.0
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    sigma_hit: 0.2
    lambda_short: 0.1

    # ── RECUPERACIÓN ─────────────────────────────────────────────────────
    # recovery_alpha: si = 0, la recuperación adaptativa está desactivada.
    # (valores típicos: 0.001 y 0.1).
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    # ── OTROS ─────────────────────────────────────────────────────────────
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    save_pose_rate: 0.5
    tf_broadcast: true
    transform_tolerance: 1.0

amcl_map_client:
  ros__parameters:
    use_sim_time: False
amcl_rclcpp_node:
  ros__parameters:
    use_sim_time: False

bt_navigator:
