bt_navigator_rclcpp_node:
  ros__parameters:
    use_sim_time: False

controller_server:
  ros__parameters:
    use_sim_time: False

    # ── FRECUENCIA DE CONTROL ─────────────────────────────────────────────
    # 10 Hz
    controller_frequency: 10.0

    # NO subir estos sin volver a probar evasión: DWB usa la velocidad feedback
    # como velocidad inicial al simular trayectorias. Si se truncan a 0 mientras
    # el robot se mueve, las predicciones de qué libra el obstáculo dejan de
    # corresponder a la realidad → roce con obstáculos (probado 2026-05-29).
    min_x_velocity_threshold: 0.002
    min_y_velocity_threshold: 0.002   # ignorado en robot diferencial
    min_theta_velocity_threshold: 0.005

    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # Distancia mínima que debe recorrer el robot en movement_time_allowance segundos.
      required_movement_radius: 0.3
      movement_time_allowance: 12.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"

      # ── TOLERANCIA DE LLEGADA AL OBJETIVO ────────────────────────────────
      # Tolerancia al llegar al goal (radianes). 0.25 rad ≈ 14°.
      xy_goal_tolerance: 0.1 # 0.25
      yaw_goal_tolerance: 0.05  # 0.07 rad ≈ 4°

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True

      # ── VELOCIDADES MÁXIMAS Y MÍNIMAS ────────────────────────────────────
      min_vel_x: 0.0     # forward-only en crucero (estado conocido-bueno: "esquiva bien", no embiste).
                         # El escape de acuñamientos lo maneja el recovery BackUp del BT (0.30m), que es
                         # consciente de colisiones. NO rehabilitar reversa acá (-0.10) sin aceptar la
                         # "reversa de crucero": DWB la elegía para tramos largos. Ver memoria nav2-dwb-reverse.
      min_vel_y: 0.0
      max_vel_x: 0.18
      max_vel_y: 0.0
      max_vel_theta: 0.4    # desde 0.6 → error en giro pasa de ~10° a ~7°
      min_speed_xy: 0.0
      max_speed_xy: 0.18
      min_speed_theta: 0.0

      # ── ACELERACIONES ─────────────────────────────────────────────────────
      acc_lim_x: 1.8        # m/s²;
      acc_lim_y: 0.0
      acc_lim_theta: 1.5    # rad/s²; 
      decel_lim_x: -1.8
      decel_lim_y: 0.0
      decel_lim_theta: -1.5

      # ── MUESTREO DE TRAYECTORIAS DWA ─────────────────────────────────────
      # vx_samples: cuántas velocidades lineales simular
      vx_samples: 20
      vy_samples: 0         
      vtheta_samples: 40

      # ── TIEMPO DE SIMULACIÓN ──────────────────────────────────────────────
      # sim_time: cuántos segundos hacia adelante simula DWB.
      sim_time: 2.0

      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2

      # xy_goal_tolerance acá es para DWB internamente (puede diferir del goal_checker).
      xy_goal_tolerance: 0.05

      trans_stopped_velocity: 0.05  # debe ser < max_vel_x (0.20); antes era 0.25 → robot siempre "detenido"
      short_circuit_trajectory_evaluation: True
      stateful: True

      # ── CRÍTICOS DE DWB ───────────────────────────────────────────────────
      # Estos puntajes determinan cómo DWB elige la mejor trayectoria.
      # Los valores son estándar
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      # NOTA: NO agregar PreferForward acá. Probado 2026-05-30: con BaseObstacle.scale=0.5,
      # cualquier scale útil de PreferForward pesa más que la evitación de obstáculos
      Oscillation.scale: 6.0  # 5.0
      Oscillation.oscillation_reset_dist: 0.05
      Oscillation.oscillation_reset_angle: 0.2  
      BaseObstacle.scale: 1.0 #0.5 # 0.2 era demasiado bajo vs PathAlign 32.0 → seguía ruta aunque hubiera obstáculos
      PathAlign.scale: 24.0  # reducido de 32.0; da más margen a BaseObstacle para desviar de ruta
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 24.0   # reducido de 32.0; ídem
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 7.0  # 8.0 aliviar Pi
      # Si vuelve a saturar, bajar a 6.0 (aparecen muchos Control loop missed desired rate)
      publish_frequency: 3.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      transform_tolerance: 0.5  # delay observado en map→odom llega a 0.247s; default 0.3s era insuficiente

      # ── TAMAÑO DEL COSTMAP LOCAL ──────────────────────────────────────────
      # 4x4 metros es el área alrededor del robot 
      width: 4
      height: 4
      resolution: 0.03  # 3cm/celda; antes 0.05 — local costmap (100x100 celdas vs 60x60)

      # ── RADIO DEL ROBOT ───────────────────────────────────────────────────
      # Modelo CIRCULAR (no footprint): base_link está casi atrás (footprint iba de x=-0.06 a 0.28),
      # el centro de rotación está corrido → al girar en el lugar el frente barre un arco grande
      robot_radius: 0.33
      # footprint: "[ [-0.06, -0.245], [-0.06, 0.24], [0.28, 0.24], [0.28, -0.245] ]"  # rectángulo real
      
      # ── CAPAS DEL COSTMAP ─────────────────────────────────────────────────
      # obstacle_layer: obstáculos 2D detectados por el lidar 
      # voxel_layer: obstáculos 3D (no usar, para cámaras, sensores 3D)
      # inflation_layer: zona de "coste" alrededor de obstáculos 

      #plugins: ["obstacle_layer", "voxel_layer", "inflation_layer"]
      plugins: ["obstacle_layer", "inflation_layer"]

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.30 # DEBE ser >= robot_radius (0.34)
        cost_scaling_factor: 1.2  # gradiente de centrado (solo actúa si inflation_radius > robot_radius)

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          observation_persistence: 6.0    # subido de 1.5: el XV-11 (1°/rayo) detecta obstáculos
                                          # chicos (~5 cm) de forma intermitente; retenerlos para evitar que
                                          # el raytracing los borre entre escaneos.
          raytrace_max_range: 2.1   # no borra celdas más allá de 2m
          raytrace_min_range: 0.17  # XV-11 no confiable bajo 15cm; lecturas menores no borran
          obstacle_max_range: 2.0   # no marca obstáculos más allá de 2m (= radio del costmap local 4x4)
          obstacle_min_range: 0.17  # lecturas bajo 15cm son ruido o el propio robot

      # voxel_layer:
      #   plugin: "nav2_costmap_2d::VoxelLayer"
      #   enabled: True   # ← cambiar a False o eliminar toda la sección
      #   publish_voxel_map: True
      #   origin_z: 0.0
      #   z_resolution: 0.05
      #   z_voxels: 16
      #   max_obstacle_height: 2.0
      #   mark_threshold: 0
      #   observation_sources: scan
      #   scan:
      #     topic: /scan
      #     max_obstacle_height: 2.0
      #     clearing: True
      #     marking: True
      #     data_type: "LaserScan"
      #     raytrace_max_range: 3.0
      #     raytrace_min_range: 0.0
      #     obstacle_max_range: 2.5
      #     obstacle_min_range: 0.0

      static_layer:
        map_subscribe_transient_local: True
      always_send_full_costmap: True

  local_costmap_client:
    ros__parameters:
      use_sim_time: False
  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0  # subido de 1.0 Hz; incorpora obstáculos nuevos más rápido al plan global
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False #True
      transform_tolerance: 0.5  # ídem local_costmap

      # ── RADIO DEL ROBOT (global) ──────────────────────────────────────────
      # Modelo CIRCULAR
      robot_radius: 0.33
      # footprint: "[ [-0.06, -0.245], [-0.06, 0.24], [0.28, 0.24], [0.28, -0.245] ]"  # rectángulo real

      resolution: 0.03  # 3cm/celda; antes 0.05 — global costmap
      track_unknown_space: true

      # plugins: ["static_layer", "obstacle_layer", "voxel_layer", "inflation_layer"]
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          # Retiene el scan x seg: 
          observation_persistence: 15.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.17
          obstacle_max_range: 2.5
          obstacle_min_range: 0.17

     
      # voxel_layer:
      #   plugin: "nav2_costmap_2d::VoxelLayer"
      #   enabled: True   # ← cambiar a False o eliminar
      #   publish_voxel_map: True
      #   origin_z: 0.0
      #   z_resolution: 0.05
      #   z_voxels: 16
      #   max_obstacle_height: 2.0
      #   mark_threshold: 0
      #   observation_sources: scan
      #   scan:
      #     topic: /scan
      #     max_obstacle_height: 2.0
      #     clearing: True
      #     marking: True
      #     data_type: "LaserScan"
      #     raytrace_max_range: 3.0
      #     raytrace_min_range: 0.0
      #     obstacle_max_range: 2.5
      #     obstacle_min_range: 0.0

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 1.2  # gradiente extendido → NavFn prefiere rutas alejadas de esquinas (antes 2.0 era abrupto)
        # 0.40 > radio circunscripto (~0.37 m): goals/frontiers pegados a obstáculos
        # Siempre debe ser MAYOR que el local
        inflation_radius: 0.40

      always_send_full_costmap: True

  global_costmap_client:
    ros__parameters:
      use_sim_time: False
  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: False

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "map.yaml"

map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      # tolerance: radio de búsqueda alrededor del goal si no es alcanzable.
      tolerance: 0.75  # aumentado de 0.5; frontiers en zona inflada → NavFn busca más lejos una celda libre
      # use_astar: false → usa Dijkstra. True → A* (más rápido en mapas grandes).
      use_astar: false
      allow_unknown: true  # true permite planear a través de espacio no explorado

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: False

# CORRECCIÓN EN EL NOMBRE DEL NODO DE RECUPERACIÓN:
# en Humble navigation_launch.py lanza el nodo "behavior_server" (NO "recoveries_server")
behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1   # nombre correcto (antes transform_timeout, ignorado)
    use_sim_time: False #true

    simulate_ahead_time: 2.0

    # ── VELOCIDADES DE RECUPERACIÓN ───────────────────────────────────────
    # Estas velocidades se usan cuando el robot está atascado y ejecuta un spin.
    max_rotational_vel: 0.4   # igual a max_vel_theta del controlador
    min_rotational_vel: 0.2   # ~50% del máximo; antes 0.3 dejaba rango muy estrecho (0.3–0.7)
    rotational_acc_lim: 1.5   # igual a acc_lim_theta del controlador

robot_state_publisher:
  ros__parameters:
    use_sim_time: False

waypoint_follower:
  ros__parameters:
    loop_rate: 200
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      # Tiempo de espera en cada waypoint (ms). 200ms = 0.2 segundos.
      waypoint_pause_duration: 500