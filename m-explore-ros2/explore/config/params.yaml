# Configuración activa (usada por explore.launch.py).
# Diferencia con params_costmap.yaml: suscribe al mapa crudo de SLAM ("map")
# en lugar del costmap inflado de Nav2 (/global_costmap/costmap).
/**:
  ros__parameters:
    robot_base_frame: base_link
    return_to_init: false               # return_to_base.py maneja el retorno a odom(0,0,0); explore_lite solo usa map frame
    costmap_topic: map                  # mapa crudo de slam_toolbox; alternativa: /global_costmap/costmap
    costmap_updates_topic: map_updates
    visualize: true                     # publica fronteras en /explore/frontiers para RViz
    planner_frequency: 0.10              # Hz — 10s entre evaluaciones; espera que actualice costmap
    progress_timeout: 110.0              # s — sin avance → blacklist del goal
    potential_scale: 4.0                # subido de 3.0: penaliza más la distancia → prefiere fronteras cercanas y explora incremental.
                                        # evita el flood de worldToMap failed (meta sobre el límite del costmap).
    orientation_scale: 0.0              # no implementado, dejar en 0
    gain_scale: 1.3                     # aumentado de 1.0; premia fronteras grandes; evita huecos pequeños
    transform_tolerance: 0.3            # s — timeout para lookups TF
    min_frontier_size: 0.9               # subido de 0.75: evita caer sobre el límite del mapa
                                         # (causa de error: worldToMap failed)
